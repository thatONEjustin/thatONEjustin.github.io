---
layout: default
---
<article class="PostDetails">
  <h1 class="font-sans">{{ page.title }}</h1>
  <div class="flex flex-row justify-between">
    <p>{{ page.date | date: "%-d %B %Y" }}</p>
    <h5 class="view">by {{ page.author | default: site.author }}</h5>
  </div>
  {% if page.tags %}
  <small>tags: <em>{{ page.tags | join: "</em>, <em>" }}</em></small>
  {% endif %}

  {{ content }}

</article>
