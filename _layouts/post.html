---
layout: default
---
<article class="PostDetails">
  <h1 class="font-sans">{{ page.title }}</h1>
  <div class="flex justify-between max-w-fit">
    <p>{{ page.date | date: "%-d %B %Y" }}</p>
    <p class="author pl-8">by {{ page.author | default: site.author }}</p>
  </div>
  {% if page.tags %}
  <p class="small">tags: <em>{{ page.tags | join: "</em>, <em>" }}</em></p>
  {% endif %}

  {{ content }}
</article>
