{% for post in site.posts %}
<article>
    <a href="{{ post.url }}">
        <div class="flex flex-row w-full justify-between items-center">
            <h4>{{ post.title }}</h4>
            <p class="small">{{ post.date| date: "%B %d, %Y"  }}</p>
        </div>
        <p class="snippet">{{ post.summary }}</p>
    </a>
</article>
{% endfor %}
