name: Justin's First Attempt at a GitHub Action w/ GitHub Pages

on: 
  push:
    branches:
      - main

jobs:
  github-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/cache@v2
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hasFiles('**/Gemfile') }}
          restore-keys: | 
            ${{ runner.os }}-gems-
      - uses: helaili/jekyll-action@2.4.0
        with: 
          token: ${{ secrets.GITHUB_TOKEN }}